
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동그라미 하네스 - 일정표</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Pretendard:wght@400;500;600;700&display=swap');
        :root {
            --notion-bg: #ffffff;
            --notion-text: #37352f;
            --notion-text-light: #787774;
            --notion-border: rgba(55, 53, 47, 0.1);
            --notion-hover: rgba(55, 53, 47, 0.05);
            --notion-blue: #2383e2;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Pretendard', sans-serif; }
        body { background: var(--notion-bg); color: var(--notion-text); line-height: 1.6; padding: 3rem 2rem; max-width: 900px; margin: 0 auto; }
        
        nav { border-bottom: 1px solid var(--notion-border); padding: 1rem 0; margin-bottom: 3rem; display: flex; gap: 1.5rem; }
        nav a { text-decoration: none; color: var(--notion-text-light); font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        nav a:hover { color: var(--notion-text); }
        nav a.active { color: var(--notion-text); font-weight: 700; }

        h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 1.5rem; }
        h2 { font-size: 1.5rem; font-weight: 600; margin: 2rem 0 1rem 0; border-bottom: 1px solid var(--notion-border); padding-bottom: 0.5rem; }
        h3 { font-size: 1.2rem; font-weight: 600; margin: 1.5rem 0 0.8rem 0; }
        p { margin-bottom: 1rem; }
        ul, ol { margin-left: 1.5rem; margin-bottom: 1.5rem; }
        li { margin-bottom: 0.5rem; }
        a { color: var(--notion-blue); text-decoration: none; }
        a:hover { text-decoration: underline; }
        blockquote { border-left: 3px solid var(--notion-text); padding-left: 1rem; color: var(--notion-text-light); font-style: italic; margin: 1.5rem 0; }
        hr { border: none; border-top: 1px solid var(--notion-border); margin: 2rem 0; }

        .iframe-container { position: relative; width: 100%; height: 800px; border: 1px solid var(--notion-border); border-radius: 8px; overflow: hidden; margin: 2rem 0; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">🏡 홈</a>
        <a href="schedule.html" class="active">🗓️ 일정표</a>
        <a href="files.html">🛠️ 파일관리</a>
    </nav>
    <div class="content">
        <h1>일정표</h1>
    </div>
</body>
</html>
