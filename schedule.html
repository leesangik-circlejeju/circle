
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정표 - 동그라미 하네스</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-primary: #818cf8;
            --accent-secondary: #c084fc;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
            padding: 15px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 1px solid var(--glass-border);
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 500;
            font-family: 'Outfit', sans-serif;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav a:hover, nav a.active {
            color: var(--accent-primary);
            transform: translateY(-2px);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            margin-top: 50px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        blockquote {
            background: rgba(129, 140, 248, 0.1);
            border-left: 5px solid var(--accent-primary);
            margin: 30px 0;
            padding: 20px;
            border-radius: 0 15px 15px 0;
            color: var(--accent-primary);
        }

        ul {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        li {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 18px 25px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
        }

        li:hover {
            transform: translateX(10px);
            border-color: var(--accent-primary);
            background: rgba(129, 140, 248, 0.15);
        }

        li a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 400;
            display: block;
            width: 100%;
        }

        .btn-sheet {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: var(--accent-primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-sheet:hover {
            background: var(--accent-secondary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html" id="nav-home">🏠 홈</a>
            <a href="schedule.html" id="nav-schedule">📅 일정표</a>
            <a href="files.html" id="nav-files">🛠️ 파일관리</a>
        </nav>
        
        <div class="content">
            <h1>일정표</h1>
<br><a href="https://docs.google.com/spreadsheets/d/1RjJlTltuygU9IbazCGKz0oqLmuPXuKa7Jm7MBBFh0yU/edit#gid=0" target="_blank" class="btn-sheet">🗓️ 마스터 구글 시트에서 열기</a>
        </div>
    </div>
    
    <script>
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        const navId = 'nav-' + currentPage.split('.')[0];
        const activeLink = document.getElementById(navId);
        if (activeLink) activeLink.classList.add('active');
    </script>
</body>
</html>
