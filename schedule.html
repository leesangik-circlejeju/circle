
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동그라미 하네스 - 일정표</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { 
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a 60%, #020617); 
            color: #f8fafc; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 5rem;
        }
        
        /* Navigation Menu */
        nav { 
            width: 100%; 
            border-bottom: 1px solid rgba(255,255,255,0.08); 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            padding: 1.25rem 0; 
            margin-bottom: 3rem;
        }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: center; gap: 3rem; }
        .nav-item { 
            text-decoration: none; 
            color: #94a3b8; 
            font-size: 1rem; 
            font-weight: 500; 
            transition: all 0.3s ease; 
            position: relative; 
            padding: 0.5rem 0; 
        }
        .nav-item:hover, .nav-item.active { color: #38bdf8; }
        .nav-item.active::after { 
            content: ''; 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 2px; 
            background: linear-gradient(90deg, #38bdf8, #a855f7); 
            border-radius: 2px; 
        }

        /* Content Layout */
        .container { width: 100%; max-width: 1000px; padding: 0 1.5rem; animation: fadeInDown 0.8s ease-out; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 32px; 
            padding: 3.5rem; 
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4); 
            position: relative;
        }

        /* Markdown Elements styling (Dark Theme) */
        h1 { 
            font-family: 'Outfit', sans-serif; 
            font-size: 3.5rem; 
            letter-spacing: -1px; 
            background: linear-gradient(135deg, #38bdf8 0%, #a855f7 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 2rem; 
            text-align: center;
        }
        h2 { 
            font-size: 1.8rem; 
            font-weight: 600; 
            margin: 2.5rem 0 1.25rem 0; 
            display: flex; 
            align-items: center; 
            gap: 0.8rem; 
            border-bottom: 1px solid rgba(255,255,255,0.06); 
            padding-bottom: 0.8rem;
            color: #f8fafc;
        }
        h3 { font-size: 1.4rem; color: #38bdf8; margin: 1.5rem 0 0.8rem 0; }
        p { color: #cbd5e1; font-size: 1.1rem; line-height: 1.8; margin-bottom: 1.5rem; }
        
        ul, ol { margin-left: 1.5rem; margin-bottom: 2rem; list-style-type: none; }
        li { 
            padding: 0.8rem 1.2rem; 
            margin-bottom: 0.75rem; 
            background: rgba(255,255,255,0.03); 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            color: #cbd5e1;
        }
        li:hover { 
            transform: translateX(10px); 
            background: rgba(56, 189, 248, 0.08); 
            border-color: rgba(56, 189, 248, 0.3);
            color: #fff;
        }
        
        a { color: #38bdf8; text-decoration: none; font-weight: 600; transition: all 0.2s; }
        a:hover { color: #a855f7; text-decoration: underline; }
        
        blockquote { 
            background: rgba(168, 85, 247, 0.05); 
            border-left: 4px solid #a855f7; 
            padding: 1.5rem 2rem; 
            border-radius: 0 16px 16px 0; 
            margin: 2rem 0; 
            color: #e2e8f0;
            font-size: 1.05rem;
        }
        
        hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 3rem 0; }

        /* Schedule Helper Components */
        .btn-open-raw { 
            position: absolute; 
            top: 2rem; 
            right: 2rem; 
            padding: 0.6rem 1.2rem; 
            background: rgba(56, 189, 248, 0.1); 
            border: 1px solid rgba(56, 189, 248, 0.3); 
            border-radius: 12px; 
            color: #38bdf8; 
            font-size: 0.85rem; 
            transition: all 0.3s ease; 
        }
        .btn-open-raw:hover { 
            background: rgba(56, 189, 248, 0.2); 
            border-color: #38bdf8; 
            color: #fff; 
            transform: translateY(-2px); 
        }

        /* Google Sheet Iframe Container */
        .iframe-container { 
            width: 100%; 
            height: 800px; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: #fff; 
            margin: 2.5rem 0;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        iframe { width: 100%; height: 100%; border: none; }

        @keyframes fadeInDown { 
            from { opacity: 0; transform: translateY(-30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="index.html" class="nav-item">🏡 홈</a>
            <a href="schedule.html" class="nav-item active" class="nav-item">🗓️ 일정표</a>
            <a href="files.html" class="nav-item">🛠️ 파일관리</a>
        </div>
    </nav>
    <div class="container">
        <div class="glass-card">
            <a href="https://docs.google.com/spreadsheets/d/1RjJlTltuygU9IbazCGKz0oqLmuPXuKa7Jm7MBBFh0yU/edit" target="_blank" class="btn-open-raw">새 탭에서 시트 열기 ↗</a>
            <h1>일정표</h1><div class="iframe-container"><iframe src="https://docs.google.com/spreadsheets/d/1RjJlTltuygU9IbazCGKz0oqLmuPXuKa7Jm7MBBFh0yU/edit?rm=minimal"></iframe></div>
        </div>
    </div>
</body>
</html>
