<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동그라미 통합 제어 보드 - 홈</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Pretendard:wght@400;500;600;700&display=swap');
        
        :root {
            --notion-bg: #ffffff;
            --notion-text: #37352f;
            --notion-text-light: #787774;
            --notion-border: rgba(55, 53, 47, 0.09);
            --notion-hover: rgba(55, 53, 47, 0.03);
            --notion-blue: #2383e2;
            --notion-gray-bg: #f1f1ef;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--notion-bg); color: var(--notion-text); line-height: 1.5; min-height: 100vh; overflow-x: hidden; }
        
        /* Navigation */
        nav { width: 100%; border-bottom: 1px solid var(--notion-border); background: #fbfbfa; position: sticky; top: 0; z-index: 1000; padding: 0.5rem 0; }
        .nav-inner { max-width: 900px; margin: 0 auto; display: flex; gap: 1.5rem; padding: 0 2rem; }
        .nav-item { text-decoration: none; color: var(--notion-text-light); font-size: 0.9rem; font-weight: 500; transition: all 0.2s ease; padding: 0.4rem 0.6rem; border-radius: 4px; }
        .nav-item:hover { background: var(--notion-hover); color: var(--notion-text); }
        .nav-item.active { color: var(--notion-text); background: var(--notion-hover); font-weight: 600; }

        /* Layout */
        .container { max-width: 900px; margin: 0 auto; padding: 3rem 2rem 5rem 2rem; width: 100%; }
        header { margin-bottom: 2.5rem; }
        header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
        header p { color: var(--notion-text-light); font-size: 1.1rem; }
        
        /* Notion Blocks */
        .callout { background: #f1f1ef; border-radius: 4px; padding: 1rem 1.25rem; display: flex; gap: 0.75rem; margin-bottom: 1.5rem; align-items: flex-start; }
        .callout .emoji { font-size: 1.25rem; }
        .callout .content { font-size: 0.95rem; color: var(--notion-text); }

        .h2-divider { border-bottom: 1px solid var(--notion-border); padding-bottom: 0.5rem; margin: 2rem 0 1rem 0; font-size: 1.4rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        
        .file-grid { display: flex; flex-direction: column; gap: 2px; }
        .file-row { display: flex; align-items: center; padding: 0.5rem 0.75rem; border-radius: 4px; text-decoration: none; color: inherit; transition: background 0.2s ease; gap: 0.75rem; }
        .file-row:hover { background: var(--notion-hover); }
        .file-icon { font-size: 1.2rem; width: 24px; text-align: center; }
        .file-name { font-size: 0.95rem; flex: 1; border-bottom: 1px solid transparent; }
        .file-row:hover .file-name { color: var(--notion-blue); text-decoration: underline; }
        
        /* Buttons */
        .btn { display: inline-flex; align-items: center; padding: 0.4rem 0.8rem; border-radius: 4px; border: 1px solid var(--notion-border); font-size: 0.9rem; font-weight: 500; cursor: pointer; text-decoration: none; color: var(--notion-text); transition: background 0.2s; }
        .btn:hover { background: var(--notion-hover); }
        
        /* Dashboard Stats */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
        .stat-card { border: 1px solid var(--notion-border); border-radius: 8px; padding: 1.25rem; }
        .stat-card .label { font-size: 0.8rem; color: var(--notion-text-light); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 0.5rem; }
        .stat-card .value { font-size: 1.75rem; font-weight: 700; color: var(--notion-text); }

        iframe { width: 100%; height: 700px; border: 1px solid var(--notion-border); border-radius: 8px; background: white; }
    </style>
</head>

<body>
    
<nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-item active">🏠 홈</a>
        <a href="schedule.html" class="nav-item ">🗓️ 일정표</a>
        <a href="files.html" class="nav-item ">📁 파일보관함</a>
    </div>
</nav>

    <div class="container">
        <header>
            <h1>🏚️ 동그라미 통합 제어 보드</h1>
            <p>프로젝트 하네스 시스템의 핵심 실시간 요약</p>
        </header>

        <div class="callout">
            <span class="emoji">💡</span>
            <div class="content">
                이 페이지는 Notion과 실시간으로 연동됩니다. 수정사항은 <b>master_run.py</b> 프로세스를 통해 양쪽 모두에 반영됩니다.
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="label">연동 서비스</div>
                <div class="value">3</div>
            </div>
            <div class="stat-card">
                <div class="label">동기화 문서</div>
                <div class="value">10</div>
            </div>
            <div class="stat-card">
                <div class="label">상태</div>
                <div class="value" style="color: #00a35c;">Active</div>
            </div>
        </div>

        <h2 class="h2-divider">📌 공지 및 최근 활동 (From Notion)</h2>
        <div id="notion-content">
            <p style='color: #787774; font-style: italic;'>노션에 '공지사항' 페이지를 만들어 내용을 채워주시면 이 영역에 자동 반영됩니다.</p>
        </div>

        <div style="margin-top: 3rem; display: flex; gap: 1rem;">
            <a href="schedule.html" class="btn">🗓️ 일정관리 이동</a>
            <a href="files.html" class="btn">📁 파일보관함 이동</a>
        </div>
    </div>
</body>
</html>
